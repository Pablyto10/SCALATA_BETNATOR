<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Scalate Pro</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header><h1>Tracker Scalate Pro</h1></header>
<div class="cards">
<div class="card"><h3>Capitale</h3><span id="capitale">0 €</span></div>
<div class="card"><h3>Profitto</h3><span id="profitto">0 €</span></div>
<div class="card"><h3>ROI</h3><span id="roi">0%</span></div>
</div>

<section class="panel">
<h2>Nuovo Step</h2>
<input id="evento" placeholder="Evento">
<input id="quota" type="number" step="0.01" placeholder="Quota">
<input id="stake" type="number" step="0.01" placeholder="Stake">
<button onclick="addStep()">Aggiungi</button>
</section>

<table>
<thead><tr><th>Evento</th><th>Quota</th><th>Stake</th></tr></thead>
<tbody id="rows"></tbody>
</table>

<canvas id="bankrollChart"></canvas>

<script src="js/app.js"></script>
</body>
</html>
